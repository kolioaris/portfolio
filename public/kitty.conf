# Font
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
force_ltr        no

# Cursor
cursor_shape                block
cursor_blink_interval       0.5
cursor_stop_blinking_after  15.0
cursor_color                #c0caf5

# Scrollback
scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0

# Mouse
mouse_hide_wait        3.0
url_color              #7aa2f7
url_style              curly
open_url_with          default
url_prefixes           file ftp ftps http https mailto
detect_urls            yes
copy_on_select         yes

# Performance
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# Terminal Bell
enable_audio_bell       no
visual_bell_duration    0.1
visual_bell_color       #f7768e
window_alert_on_bell    yes

# Window
remember_window_size    yes
initial_window_width    1200
initial_window_height   700
window_padding_width    12
window_padding_height   12
placement_strategy      center
hide_window_decorations no
confirm_os_window_close 1

# Tabs
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
active_tab_font_style   bold
inactive_tab_foreground #545c7e
inactive_tab_background #24283b
inactive_tab_font_style normal
tab_bar_background      #1a1b26

# Colors
background              #1a1b26
foreground              #c0caf5
selection_background    #364a82
selection_foreground    #c0caf5

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7dcfff

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# Backgrounds
background_opacity      0.95
background_blur         20
dynamic_background_opacity yes

# Keybindings

# Tabs
map ctrl+t         new_tab
map ctrl+w         close_tab
map ctrl+right     next_tab
map ctrl+left      previous_tab
map ctrl+shift+t   set_tab_title

# Windows/Splits
map ctrl+shift+enter  new_window
map ctrl+shift+w      close_window
map ctrl+shift+right  next_window
map ctrl+shift+left   previous_window

# Split like tmux
map ctrl+shift+d  launch --location=hsplit
map ctrl+shift+r  launch --location=vsplit

# Font size
map ctrl+equal    change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0

# Clipboard
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard

# Scrollback
map ctrl+shift+up    scroll_line_up
map ctrl+shift+down  scroll_line_down
map ctrl+shift+k     scroll_line_up
map ctrl+shift+j     scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home  scroll_home
map ctrl+shift+end   scroll_end

# Shell Integration
shell_integration     enabled
allow_remote_control  yes
listen_on             unix:/tmp/kitty

# Misc
editor                nvim
close_on_child_death  no
term                  xterm-kitty
