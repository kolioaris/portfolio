// For all the comments to work properly,
// (because this config has a lot of icons)
// I recommend using the FiraCode Nerd Font.
//           nerdfonts.com
// ==============================
// =          Keybinds         =
// ==============================
unbindall
bind "MWHEELUP" "+jump" // Jump - for bunnyhop
bind "n" "noclip" // NoClip - for practice
bind "MWHEELDOWN" "+jump" // Jump - for bunnyhop
bind "a" "+left" // Left
bind "d" "+right" // Right
bind "s" "+back" // Back
bind "w" "+forward" // Forward
bind "SPACE" "+jump" // Jump
bind "MOUSE1" "+attack" // Shoot-Attack
bind "v" "+spray_menu" // Spray Menu
bind "CAPSLOCK" "+voicerecord" // Push-to-Talk
bind "MOUSE2" "+attack2" // Scope - Secondary Attack
bind "SHIFT" "+sprint" // Shift Sprint
bind "CTRL" "+duck" // Duck-Crouch
bind "MOUSE4" "slot3" // Knife
bind "MOUSE3" "player_ping" // Ping
bind "MOUSE5" "slot2" // Pistol
bind "c" "switchhands" // Switch Hands
bind "y" "messagemode" // All Chat
bind "ALT" "slot1" // Main Weapon
bind "`" "toggleconsole" // Console
bind "ENTER" "ent_fire_output script OnUser1 KeyInput,Enter" // I do not even know I just found it in my keys config
bind "BACKSPACE" "ent_fire_output script OnUser1 KeyInput,Backspace" // I do not even know I just found it in my keys config
bind "DEL" "ent_fire_output script OnUser1 KeyInput,Delete" // I do not even know I just found it in my keys config
bind "z" "radio" // Radio
bind "u" "messagemode2" // Team Chat
bind "g" "drop" // Drop Weapon
bind "e" "use" // Use something (for example plant/defuse bomb)
bind "r" "reload" // Reload weapon/Stop animation
bind "f" "lookatweapon" // Inspect
bind "b" "buymenu" // Buy menu
bind "TAB" "showscores" // Scoreboard 
bind "m" "teammenu" // Change teams
bind "x" "slot12" // Healthshot
bind "h" "slot11"; // Zeus
bind "2" "slot7" // Flashbang
bind "3" "slot8" // Smoke
bind "1" "slot6" // HE
bind "4" "slot10" // Molotov and Incendiary
bind "z" "slot4" // Cycle Grenades

// ==============================
// =          󰌵 Gamma           =
// ==============================
r_fullscreen_gamma 1.990551

// ==============================
// =         Crosshair         =
// ==============================
// Code: CSGO-FdMrN-AKNQm-HRamQ-OviW8-Haq3B
cl_crosshairalpha "228"
cl_crosshaircolor "5"
cl_crosshaircolor_b "255"
cl_crosshaircolor_r "0"
cl_crosshaircolor_g "0"
cl_crosshairdot "false"
cl_crosshairgap "-4"
cl_crosshairsize "1"
cl_crosshairstyle "4"
cl_crosshairusealpha "true"
cl_crosshairthickness "0.908095"
cl_fixedcrosshairgap "-9"
cl_crosshair_outlinethickness "0.031154"
cl_crosshair_drawoutline "false"
cl_crosshair_recoil "true"

// ==============================
// =         Viewmodel         =
// ==============================
viewmodel_offset_x 2.5
viewmodel_offset_y 2
viewmodel_offset_z -1.5
viewmodel_fov 68