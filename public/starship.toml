# General
format = """
[](fg:#1a1b26)\
$os\
[](fg:#1a1b26 bg:#24283b)\
$username\
$hostname\
[](fg:#24283b bg:#414868)\
$directory\
[](fg:#414868 bg:#7aa2f7)\
$git_branch\
$git_status\
[](fg:#7aa2f7 bg:#bb9af7)\
$git_metrics\
[](fg:#bb9af7)\
$fill\
$cmd_duration\
$time\
$battery\
$line_break\
$character"""

add_newline = true

# Fill
[fill]
symbol = " "

# OS
[os]
disabled = false
style = "bg:#1a1b26 fg:#7aa2f7 bold"
format = '[ $symbol ]($style)'

[os.symbols]
Arch = "󰣇"
Windows = ""
Ubuntu = ""
Debian = ""
Fedora = "󰮤"
Manjaro = ""
NixOS = ""
Mac = ""

# Username
[username]
show_always = true
style_user = "bg:#24283b fg:#7dcfff bold"
style_root = "bg:#24283b fg:#f7768e bold"
format = '[ 󰀄 $user ]($style)'

# Hostname
[hostname]
ssh_only = false
style = "bg:#24283b fg:#e0af68 bold"
format = '[@$hostname ]($style)'

# Directory
[directory]
style = "bg:#414868 fg:#c0caf5 bold"
truncation_length = 4
truncate_to_repo = true
format = '[ 󰉋 $path ]($style)'
read_only = " 󰌾"
read_only_style = "bg:#414868 fg:#f7768e"

# Git Branch
[git_branch]
symbol = ""
style = "bg:#7aa2f7 fg:#1a1b26 bold"
format = '[ $symbol $branch ]($style)'

# Git Status
[git_status]
style = "bg:#7aa2f7 fg:#1a1b26 bold"
format = '([$all_status$ahead_behind ]($style))'
conflicted = "󰩅 "
ahead = "󰶣${count}"
behind = "󰶡${count}"
diverged = "󰿗 "
untracked = "󰋗${count}"
stashed = "󰆧"
modified = "󰏫${count}"
staged = "󰐗${count}"
deleted = "󰮉${count}"

# Git Metrics
[git_metrics]
added_style = "bg:#bb9af7 fg:#1a1b26 bold"
deleted_style = "bg:#bb9af7 fg:#1a1b26 bold"
format = '([󰐕$added ]($added_style))([ 󰍴$deleted]($deleted_style) )'
disabled = false

# Command Duration
[cmd_duration]
min_time = 500
style = "fg:#e0af68 bold"
format = '[ 󱦟 $duration ]($style)'

# Time
[time]
disabled = false
style = "fg:#7dcfff bold"
format = '[ 󰥔 $time ]($style)'
time_format = "%H:%M"

# Battery
[battery]
format = '[$symbol$percentage ]($style)'

[[battery.display]]
threshold = 20
style = "fg:#f7768e bold"
discharging_symbol = "󰂃"
charging_symbol = "󰂄"

[[battery.display]]
threshold = 50
style = "fg:#e0af68 bold"
discharging_symbol = "󰁾"
charging_symbol = "󰂄"

[[battery.display]]
threshold = 100
style = "fg:#9ece6a bold"
discharging_symbol = "󰁹"
charging_symbol = "󰂄"

# Character
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# Languages
[python]
symbol = " "
style = "fg:#e0af68 bold"
format = '[ $symbol$version ]($style)'

[nodejs]
symbol = " "
style = "fg:#9ece6a bold"
format = '[ $symbol$version ]($style)'

[rust]
symbol = " "
style = "fg:#f7768e bold"
format = '[ $symbol$version ]($style)'

[docker_context]
symbol = " "
style = "fg:#7aa2f7 bold"
format = '[ $symbol$context ]($style)'

[lua]
symbol = " "
style = "fg:#7aa2f7 bold"
format = '[ $symbol$version ]($style)'

[java]
symbol = " "
style = "fg:#f7768e bold"
format = '[ $symbol$version ]($style)'
