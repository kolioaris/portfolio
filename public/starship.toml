# General
format = """
[╭─](bold green)$os$username$hostname$directory$git_branch$git_status$git_metrics
[╰─](bold green)$character"""

right_format = """$cmd_duration$time$battery"""

add_newline = true

# OS Icon
[os]
disabled = false
style = "bold blue"

[os.symbols]
Arch = " "
Windows = " "
Ubuntu = " "

# Username
[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style) "

# Hostname
[hostname]
ssh_only = false
style = "bold yellow"
format = "on [$hostname]($style) "

# Directory
[directory]
style = "bold green"
truncation_length = 4
truncate_to_repo = true
format = "in [$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

# Git
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

# Right side
[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style) "

[time]
disabled = false
style = "bold white"
format = "🕐 [$time]($style) "
time_format = "%H:%M"

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "💀"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

# Languages (auto detected)
[python]
symbol = " "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = " "
style = "bold red"

[docker_context]
symbol = " "
style = "bold blue"
